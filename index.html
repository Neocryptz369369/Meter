<html lang="en">

<body>
    <div id="error-banner" style="display:none; color:red;"></div>

        <!-- Your form elements go here -->

    <script>
        function showError(message) {
            const errorBanner = document.getElementById('error-banner');
            errorBanner.textContent = message;
            errorBanner.style.display = 'block';
        }

        function clearError() {
            const errorBanner = document.getElementById('error-banner');
            errorBanner.style.display = 'none';
        }

        function initAutocomplete() {
            if (typeof google === 'undefined' || !google.maps || !google.maps.places) {
                showError('Google Maps Places library is missing.');
                return;
            }
            // Your original initAutocomplete logic here
        }

        function renderPayPal() {
            if (typeof paypal === 'undefined') {
                showError('PayPal buttons library is missing.');
                return;
            }
            // Your original renderPayPal logic here
        }
    </script>
</body>
</html>
